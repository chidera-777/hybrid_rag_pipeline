name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"
      
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://huggingface.co/spaces/FerdinandC777/rag-api || true
          git pull https://FerdinandC777:$HF_TOKEN@huggingface.co/spaces/FerdinandC777/rag-api main --rebase --allow-unrelated-histories || true
          git push https://FerdinandC777:$HF_TOKEN@huggingface.co/spaces/FerdinandC777/rag-api main --force